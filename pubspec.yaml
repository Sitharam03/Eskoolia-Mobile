name: eskoolia_mobile
description: "Eskoolia School ERP Mobile App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management & routing
  get: ^4.6.6

  # HTTP client
  dio: ^5.4.3+1

  # Secure token storage
  flutter_secure_storage: ^9.2.4

  # Google Fonts
  google_fonts: ^6.1.0

  # Utilities
  intl: ^0.19.0
  file_picker: ^10.3.10
  pdf: ^3.12.0
  printing: ^5.14.3

  # Chat / WebSocket
  web_socket_channel: ^3.0.2
  record: ^5.2.1
  path_provider: ^2.1.5
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/eSkoolia_logo.jpeg
